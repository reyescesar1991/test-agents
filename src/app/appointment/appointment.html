<div class="appointment-container">
  <header class="appointment-header">
    <h1>
      Reserva tu 
      <span class="inline-visual">
        <svg class="inline-icon" viewBox="0 0 24 24">
          <path fill="#3B82F6" d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/>
        </svg><span class="icon-label">cita</span>
      </span>
    </h1>
    <p class="header-subtitle">Selecciona tu horario ideal para atención personalizada</p>
  </header>

  <form class="appointment-form" [formGroup]="appointmentForm">
    <div class="form-stack">
      <!-- Fila 1 -->
      <div class="input-row">
        <div class="input-group">
          <label for="fullName">Nombre completo</label>
          <input id="fullName" type="text" formControlName="fullName" class="text-input" placeholder="Ej: Ana Pérez López">
        </div>
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" formControlName="email" class="text-input" placeholder="ana@dominio.com">
        </div>
      </div>

      <!-- Fila 2 -->
      <div class="input-row">
        <div class="input-group">
          <label for="service">Servicio</label>
          <select id="service" formControlName="service" class="select-input">
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="general">Consulta general</option>
            <option value="specialty">Especialidad</option>
            <option value="emergency">Urgencia</option>
          </select>
        </div>
        <div class="input-group">
          <label for="date">Fecha y hora</label>
          <div class="datetime-input-wrapper">
            <input id="date" type="datetime-local" formControlName="date" class="datetime-input">
            <div class="time-slots">
              <button type="button" class="time-chip" *ngFor="let slot of timeSlots" [class.selected]="slot === selectedSlot" (click)="selectTimeSlot(slot)">
                {{slot}}
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Fila 3 -->
      <div class="input-group full-width">
        <label for="notes">Detalles adicionales</label>
        <textarea id="notes" formControlName="notes" class="textarea-input" rows="3" placeholder="Describe cualquier necesidad especial"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-button" [disabled]="!appointmentForm.valid">
        <span>Confirmar cita</span>
        <svg class="arrow-icon" viewBox="0 0 24 24">
          <path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>
    </div>
  </form>
</div>
