<main class="login-layout">
  <!-- Left Section: Visual & Editorial -->
  <section class="editorial-side">
    <div class="editorial-content">
      <h1 class="display-headline">
        We build 
        <span class="inline-image"><img src="https://picsum.photos/seed/tech1/120/120" alt="Technology"></span>
        digital 
        <span class="inline-image"><img src="https://picsum.photos/seed/tech2/120/120" alt="Design"></span>
        experiences that 
        <span class="inline-image"><img src="https://picsum.photos/seed/tech3/120/120" alt="Emotion"></span>
        resonate.
      </h1>
      <p class="editorial-subtext">
        Access your dashboard to manage your projects with precision and intent.
      </p>
    </div>
  </section>

  <!-- Right Section: Functional Form -->
  <section class="form-side">
    <div class="login-card">
      <div class="card-header">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-subtitle">Please enter your credentials to continue.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="name@company.com"
            [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          >
          <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            Please enter a valid email address.
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Password must be at least 6 characters long.
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loginForm.pending">
          Sign In
        </button>

        <div class="form-footer">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
      </form>
    </div>
  </section>
</main>
